<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Suraj">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#69C6A2"/>
      <stop offset="1" stop-color="#4F9F98"/>
    </linearGradient>
  </defs>

  <!-- Rounded brand tile (matches the Navbar logo gradient) -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#brand)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none"
        stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1"/>

  <!-- "S" monogram drawn as a stroke so it stays crisp at every size -->
  <path d="M43 23C43 17 36 16 31 16C24 16 21 20 21 25C21 30 26 31 32 32C38 33 43 34 43 39C43 44 39 48 31 48C25 48 21 46 21 41"
        fill="none" stroke="#0C1813" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
